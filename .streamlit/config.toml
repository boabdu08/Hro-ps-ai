[theme]
# Baseline theme (kept neutral) so our injected design tokens can fully control look.
# NOTE: Dark/Light switching is implemented in Python + injected CSS (ui_components.py).
primaryColor = "#3B82F6"               # brand blue
backgroundColor = "#F7F9FB"            # light canvas
secondaryBackgroundColor = "#FFFFFF"   # elevated surface
textColor = "#1F2937"                  # ink
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
