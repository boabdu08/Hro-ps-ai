name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hro_ps_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hro_ps_ai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/hro_ps_ai_test
      JWT_SECRET_KEY: ci-test-secret
      API_BASE_URL: http://127.0.0.1:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CI: install only what's needed to validate backend+db+auth and imports.
          # Heavy ML dependencies (tensorflow/shap) are intentionally skipped.
          pip install -r requirements-api.txt
          pip install -r requirements-dashboard.txt
          pip install pytest==8.2.2 black==24.4.2 isort==5.13.2 flake8==7.0.0

      - name: Backend + dashboard imports (no heavy ML load)
        env:
          # Prevent TensorFlow import from being required during import.
          # Inference is lazy-loaded.
          TF_CPP_MIN_LOG_LEVEL: "3"
        run: |
          python -c "import main"
          python -c "import dashboard"

      - name: Format check (black)
        run: black --check .

      - name: Import sort check (isort)
        run: isort --check-only .

      - name: Lint (flake8)
        run: flake8 .

      - name: DB init + seed demo
        run: |
          python -c "import models"  # ensure models are registered
          python scripts/seed_demo.py

      - name: Start API (background)
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          sleep 2

      - name: API health smoke
        env:
          BASE_URL: http://127.0.0.1:8000
        run: |
          python -m pytest -q tests/test_health.py

      - name: Run tests
        run: pytest

      - name: Docker build
        run: docker build -t hro-ps-ai:ci .
